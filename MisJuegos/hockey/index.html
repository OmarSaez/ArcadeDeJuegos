<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hockey de Aire Arcade V2</title>
    <!-- Librerías -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Pantalla Menú Principal -->
    <div id="screen-menu" class="screen">
        <h1 class="title">HOCKEY ARCADE<br><span style="font-size: 1rem; color: white;">NUEVA BASE (FÍSICAS REALES)</span></h1>
        
        <input type="text" id="input-nick" placeholder="TU NOMBRE (Ej: Omar)">
        <button onclick="createRoom()">CREAR SALA (HOST)</button>
        
        <div class="row">
            <input type="text" id="input-code" placeholder="CÓDIGO" style="width: 120px; text-transform: uppercase;">
            <button onclick="joinRoom()" class="secondary">UNIRSE</button>
        </div>
        
        <button class="secondary" onclick="window.location.href='../../index.html'" style="margin-top: 30px;">VOLVER AL ARCADE</button>
    </div>

    <!-- Pantalla Lobby -->
    <div id="screen-lobby" class="screen hidden">
        <h2>SALA: <span id="lobby-code" style="color: var(--accent);">----</span></h2>
        
        <div class="panel" style="margin-bottom: 20px;">
            <h3>PERSONALIZAR</h3>
            <div class="row" style="justify-content: center;">
                <button id="btn-team-a" onclick="setTeam('A')" style="background: #ff4757; color: white; box-shadow: 0 4px 0 #c0392b;">EQUIPO A</button>
                <button id="btn-team-b" onclick="setTeam('B')" style="background: #3742fa; color: white; box-shadow: 0 4px 0 #2e34c0;" class="secondary">EQUIPO B</button>
            </div>
            <div style="margin-top: 10px;">
                <label style="color: #94a3b8; font-weight: bold; margin-right: 10px;">COLOR:</label>
                <input type="color" id="input-color" value="#ff4757" onchange="setColor(this.value)" style="height: 40px; cursor: pointer; padding: 0; width: 60px;">
            </div>
        </div>

        <div class="panel">
            <h3>JUGADORES</h3>
            <div id="player-list" style="display: flex; gap: 20px; justify-content: center; min-width: 250px;">
                <div style="flex: 1;">
                    <h4 id="title-team-a" style="color: #ff4757; margin-bottom: 10px;">EQUIPO A</h4>
                    <div id="list-team-a"></div>
                </div>
                <div style="flex: 1;">
                    <h4 id="title-team-b" style="color: #3742fa; margin-bottom: 10px;">EQUIPO B</h4>
                    <div id="list-team-b"></div>
                </div>
            </div>
        </div>

        <div id="host-controls" class="hidden" style="margin-top: 20px;">
            <button onclick="startGame()">INICIAR PARTIDA</button>
        </div>
        <p id="wait-msg" class="hidden" style="color: #aaa; margin-top: 20px;">Esperando a que el anfitrión inicie...</p>
    </div>

    <!-- Puntaje Flotante -->
    <div id="score-display" class="hidden" style="position: absolute; top: 5%; width: 100%; text-align: center; font-size: 3rem; font-family: 'Press Start 2P', cursive; z-index: 20; color: white; text-shadow: 0 0 10px black, 4px 4px 0px rgba(0,0,0,0.5); pointer-events: none;">
        <span id="score-a" style="color: #ff4757;">0</span> - <span id="score-b" style="color: #3742fa;">0</span>
    </div>

    <!-- Pantalla Juego -->
    <div id="screen-game" class="screen hidden">
        <canvas id="game-canvas"></canvas>
    </div>

    <script src="game.js"></script>
</body>

</html>
