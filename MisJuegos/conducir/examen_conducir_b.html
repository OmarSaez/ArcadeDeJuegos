<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Teórico de Conducción - Clase B</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: radial-gradient(circle at top right, rgba(79, 70, 229, 0.15), transparent),
                              radial-gradient(circle at bottom left, rgba(79, 70, 229, 0.1), transparent);
        }

        .container {
            width: 100%;
            max-width: 600px;
            perspective: 1000px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.4s ease, opacity 0.4s ease;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(to right, var(--primary), #818cf8);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 1.2rem;
            line-height: 1.6;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .options-list {
            list-style: none;
        }

        .option-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .option-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }

        .option-item.selected {
            background: rgba(79, 70, 229, 0.2);
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.3);
        }

        .option-letter {
            width: 32px;
            height: 32px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        .selected .option-letter {
            background: var(--primary);
            color: white;
        }

        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: flex-end;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Results Screen */
        .results {
            text-align: center;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 8px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            margin: 0 auto 20px;
        }

        .review-item {
            text-align: left;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .status-correct { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .status-wrong { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        .correct-answer-text {
            color: var(--success);
            font-weight: 600;
            margin-top: 8px;
            font-size: 0.95rem;
        }

        .hidden { display: none; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in { animation: fadeIn 0.4s ease forwards; }

        @media (max-width: 480px) {
            .glass-card { padding: 20px; }
            h1 { font-size: 1.25rem; }
            .question-text { font-size: 1.1rem; }
        }
    </style>
</head>

      {"id":274,"question":"Químicos:","options":{"a":"Averiguar clase."},"answer":["a"]},
      {"id":275,"question":"Motociclista shock:","options":{"a":"No saque casco."},"answer":["a"]},
      {"id":276,"question":"Caja camión:","options":{"a":"Continúa hasta teléfono."},"answer":["a"]},
      {"id":277,"question":"Seguro:","options":{"a":"Tercero afectado."},"answer":["a"]},
      {"id":278,"question":"Documento no:","options":{"a":"Inscripción Registro Nacional."},"answer":["a"]},
      {"id":279,"question":"Infracciones:","options":{"a":"Alcohol.","b":"PARE.","c":"Multa y suspensión."},"answer":["a","b","c"]},
      {"id":280,"question":"Infracciones:","options":{"a":"Multas suspensión.","b":"Dos graves 12 meses.","c":"Ceda Paso accidente."},"answer":["a","b","c"]}
    ];

    let currentQuestions = [];
    let currentIndex = 0;
    let userAnswers = [];
    let score = 0;

    function initQuiz() {
        currentQuestions = [...questionsPool]
            .sort(() => Math.random() - 0.5)
            .slice(0, 10);
        
        currentIndex = 0;
        userAnswers = [];
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentIndex];
        document.getElementById('progress-text').innerText = `Pregunta ${currentIndex + 1} de 10`;
        document.getElementById('progress-fill').style.width = `${((currentIndex + 1) / 10) * 100}%`;
        document.getElementById('question-text').innerText = q.question;
        
        const optionsList = document.getElementById('options-list');
        optionsList.innerHTML = '';
        
        Object.entries(q.options).forEach(([letter, text]) => {
            const li = document.createElement('div');
            li.className = 'option-item';
            li.innerHTML = `
                <div class="option-letter">${letter.toUpperCase()}</div>
                <div class="option-text">${text}</div>
            `;
            
            li.onclick = () => selectOption(li, letter, q.answer.length > 1);
            optionsList.appendChild(li);
        });

        document.getElementById('next-btn').disabled = true;
        document.getElementById('next-btn').innerText = currentIndex === 9 ? 'Finalizar' : 'Siguiente';
    }

    function selectOption(element, letter, isMultiple) {
        if (!isMultiple) {
            document.querySelectorAll('.option-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            userAnswers[currentIndex] = [letter];
        } else {
            element.classList.toggle('selected');
            const selectedLetters = Array.from(document.querySelectorAll('.option-item.selected'))
                .map(el => el.querySelector('.option-letter').innerText.toLowerCase());
            userAnswers[currentIndex] = selectedLetters;
        }
        
        document.getElementById('next-btn').disabled = userAnswers[currentIndex].length === 0;
    }

    document.getElementById('next-btn').onclick = () => {
        if (currentIndex < 9) {
            currentIndex++;
            showQuestion();
        } else {
            showResults();
        }
    };

    function showResults() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('results-screen').classList.remove('hidden');
        
        score = 0;
        const reviewContainer = document.getElementById('review-container');
        reviewContainer.innerHTML = '';

        currentQuestions.forEach((q, i) => {
            const userAns = userAnswers[i] || [];
            const correctAns = q.answer;
            const isCorrect = userAns.length === correctAns.length && 
                              userAns.every(val => correctAns.includes(val));
            
            if (isCorrect) score++;

            const reviewItem = document.createElement('div');
            reviewItem.className = 'review-item';
            reviewItem.innerHTML = `
                <div class="status-badge ${isCorrect ? 'status-correct' : 'status-wrong'}">
                    ${isCorrect ? 'Correcta' : 'Incorrecta'}
                </div>
                <div style="font-weight: 600; margin-bottom: 8px;">${i + 1}. ${q.question}</div>
                <div style="font-size: 0.9rem; color: var(--text-muted);">
                    Tu respuesta: ${userAns.join(', ').toUpperCase() || 'Ninguna'}
                </div>
                ${!isCorrect ? `
                    <div class="correct-answer-text">
                        Respuesta correcta: ${correctAns.join(', ').toUpperCase()} - 
                        ${correctAns.map(l => q.options[l]).join(' y ')}
                    </div>
                ` : ''}
            `;
            reviewContainer.appendChild(reviewItem);
        });

        document.getElementById('score-display').innerText = `${score}/10`;
        const msg = score >= 9 ? "¡Excelente! Estás listo para el examen." : 
                    score >= 7 ? "Bien, pero sigue practicando." : 
                    "Necesitas estudiar un poco más.";
        document.getElementById('result-message').innerText = msg;
    }

    initQuiz();
</script>

</html>
